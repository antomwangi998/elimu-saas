name: Build & Release ElimuSaaS APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'What changed in this release'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  build-and-release:
    name: Build Signed APK & Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle wrapper ──────────────────────────────────────
      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      # ── 5. Version numbers ─────────────────────────────────────
      - name: Set version variables
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version_name }}"
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            VER="${GITHUB_REF#refs/tags/v}"
            NOTES="Release $VER"
          fi
          echo "VERSION_NAME=$VER" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES=$NOTES" >> $GITHUB_OUTPUT
          IFS='.' read -r MA MI PA <<< "$VER"
          echo "VERSION_CODE=$(( ${MA:-1}*10000 + ${MI:-0}*100 + ${PA:-0} ))" >> $GITHUB_OUTPUT

      # ── 6. Patch version into build.gradle ────────────────────
      - name: Patch version
        working-directory: android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.VERSION_NAME }}\"/" app/build.gradle

      # ── 7. GENERATE KEYSTORE ON THE SERVER ────────────────────
      #    No phone/PC needed. If KEYSTORE_BASE64 secret exists we
      #    use it (for consistent re-signing). If it doesn't exist
      #    we auto-generate one — and we then print the base64 in
      #    the logs so you can save it as a secret for next time.
      - name: Setup keystore
        id: keystore
        run: |
          KS_FILE="android/app/keystore.jks"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "→ Using saved keystore from secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KS_FILE"
            echo "KS_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"           >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_OUTPUT
          else
            echo "→ No keystore secret found — auto-generating one now"
            KS_PASS="ElimuSaaS$(date +%Y)!Secure"
            KS_ALIAS="elimusaas"

            keytool -genkeypair \
              -v \
              -keystore "$KS_FILE" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias "$KS_ALIAS" \
              -storepass "$KS_PASS" \
              -keypass  "$KS_PASS" \
              -dname "CN=ElimuSaaS, OU=Mobile, O=ElimuSaaS Ltd, L=Nairobi, ST=Nairobi, C=KE" \
              -noprompt

            # Print base64 so you can save it as a secret
            echo ""
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║  SAVE THESE AS GITHUB SECRETS TO REUSE THIS KEYSTORE ║"
            echo "╠══════════════════════════════════════════════════════╣"
            echo "║  Secret name : KEYSTORE_BASE64                        ║"
            echo "║  Secret value: (see next line)                        ║"
            echo "╚══════════════════════════════════════════════════════╝"
            base64 -w 0 "$KS_FILE"
            echo ""
            echo "Secret name : KEYSTORE_PASSWORD  →  $KS_PASS"
            echo "Secret name : KEY_ALIAS          →  $KS_ALIAS"
            echo "Secret name : KEY_PASSWORD       →  $KS_PASS"
            echo ""

            echo "KS_PASSWORD=$KS_PASS"  >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=$KS_ALIAS"   >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=$KS_PASS" >> $GITHUB_OUTPUT
          fi

      # ── 8. Build signed release APK ────────────────────────────
      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.KS_PASSWORD }}
          KEY_ALIAS: ${{ steps.keystore.outputs.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── 9. Rename APK ──────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             "release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk"

      # ── 10. Upload as workflow artifact (always available) ─────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElimuSaaS-APK-v${{ steps.version.outputs.VERSION_NAME }}
          path: release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk
          retention-days: 90

      # ── 11. Create GitHub Release with APK attached ────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.VERSION_NAME) || github.ref_name }}
          name: ElimuSaaS v${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## 📱 ElimuSaaS Android App — v${{ steps.version.outputs.VERSION_NAME }}

            ${{ steps.version.outputs.RELEASE_NOTES }}

            ---

            ### 📥 How to Install on Android
            1. Tap **ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk** below to download
            2. Open the downloaded file from your notifications
            3. Tap **Install** — if blocked, go to Settings → Security → enable *Install unknown apps* for your browser
            4. Open **ElimuSaaS** and sign in with your school credentials

            > 🔗 Same backend as the website · Fingerprint login · Works offline

            **Backend:** https://elimu-saas.onrender.com
            **Frontend:** https://elimu-saas-frontend.onrender.com
          files: release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Cleanup ────────────────────────────────────────────
      - name: Remove keystore from runner
        if: always()
        run: rm -f android/app/keystore.jks
