name: Build & Release ElimuSaaS APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.1)"
        required: true
        default: "3.1.1"
      release_notes:
        description: "What changed in this release"
        required: false
        default: "Bug fixes and improvements"

jobs:
  build-and-release:
    name: Build Signed APK & Publish Release
    runs-on: ubuntu-latest

    env:
      ANDROID_DIR: android
      APP_PATH: android/app/src/main/java/ke/elimusaas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        working-directory: ${{ env.ANDROID_DIR }}
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      # -------------------------------
      # PATCH SOURCE FILES
      # -------------------------------
      - name: Create Kotlin source files
        run: |
          mkdir -p $APP_PATH/data
          mkdir -p $APP_PATH/utils

          echo "<BASE64_MODELS>" | base64 --decode > $APP_PATH/data/Models.kt
          echo "<BASE64_SESSION>" | base64 --decode > $APP_PATH/utils/SessionManager.kt
          echo "<BASE64_CACHE>" | base64 --decode > $APP_PATH/utils/OfflineCache.kt
          echo "<BASE64_NOTIFICATION>" | base64 --decode > $APP_PATH/utils/NotificationHelper.kt
          echo "<BASE64_API>" | base64 --decode > $APP_PATH/utils/ApiClient.kt

      # -------------------------------
      # BUILD APK
      # -------------------------------
      - name: Build Release APK
        working-directory: ${{ env.ANDROID_DIR }}
        run: ./gradlew assembleRelease

      # -------------------------------
      # SIGN APK (optional if you add secrets)
      # -------------------------------
      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          jarsigner \
            -keystore keystore.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.KEY_ALIAS }}

      # -------------------------------
      # RENAME APK
      # -------------------------------
      - name: Rename APK
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          FINAL_APK="ElimuSaaS-${{ github.event.inputs.version_name || github.ref_name }}.apk"
          mv $APK_PATH $FINAL_APK
          echo "APK_NAME=$FINAL_APK" >> $GITHUB_ENV

      # -------------------------------
      # CREATE GITHUB RELEASE
      # -------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ElimuSaaS ${{ github.event.inputs.version_name || github.ref_name }}"
          body: ${{ github.event.inputs.release_notes }}
          files: ${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
