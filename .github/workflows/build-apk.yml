name: Build & Release ElimuSaaS APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        default: '1.1.0'
      release_notes:
        description: 'What changed in this release'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  build-and-release:
    name: Build Signed APK & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Patch LoginActivity and Models
        run: |
          mkdir -p android/app/src/main/java/ke/elimusaas/ui
          mkdir -p android/app/src/main/java/ke/elimusaas/data
          echo "" | base64 --decode > android/app/src/main/java/ke/elimusaas/ui/LoginActivity.kt
          echo "" | base64 --decode > android/app/src/main/java/ke/elimusaas/data/Models.kt
          echo "Patch done"
          grep -c "btnBiometric" android/app/src/main/java/ke/elimusaas/ui/LoginActivity.kt && echo "FAIL: btnBiometric found" || echo "OK: no btnBiometric"
          grep -c "val year" android/app/src/main/java/ke/elimusaas/data/Models.kt && echo "OK: year field present" || echo "FAIL: year missing"

      - name: Set version variables
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version_name }}"
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            VER="${GITHUB_REF#refs/tags/v}"
            NOTES="Release $VER"
          fi
          echo "VERSION_NAME=$VER" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES=$NOTES" >> $GITHUB_OUTPUT
          IFS='.' read -r MA MI PA <<< "$VER"
          echo "VERSION_CODE=$(( ${MA:-1}*10000 + ${MI:-0}*100 + ${PA:-0} ))" >> $GITHUB_OUTPUT

      - name: Patch version in build.gradle
        working-directory: android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.VERSION_NAME }}\"/" app/build.gradle

      - name: Setup keystore
        id: keystore
        run: |
          KS_FILE="android/app/keystore.jks"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using saved keystore"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KS_FILE"
            echo "KS_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"           >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_OUTPUT
          else
            echo "Auto-generating keystore"
            KS_PASS="ElimuSaaS$(date +%Y)Secure"
            KS_ALIAS="elimusaas"
            keytool -genkeypair -v               -keystore "$KS_FILE" -keyalg RSA -keysize 2048 -validity 10000               -alias "$KS_ALIAS" -storepass "$KS_PASS" -keypass "$KS_PASS"               -dname "CN=ElimuSaaS, O=ElimuSaaS Ltd, C=KE" -noprompt
            echo "=== SAVE THESE AS GITHUB SECRETS ==="
            echo "KEYSTORE_BASE64:"
            base64 -w 0 "$KS_FILE"
            echo ""
            echo "KEYSTORE_PASSWORD: $KS_PASS"
            echo "KEY_ALIAS: $KS_ALIAS"
            echo "KEY_PASSWORD: $KS_PASS"
            echo "KS_PASSWORD=$KS_PASS"  >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=$KS_ALIAS"   >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=$KS_PASS" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.KS_PASSWORD }}
          KEY_ALIAS: ${{ steps.keystore.outputs.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk              "release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElimuSaaS-APK-v${{ steps.version.outputs.VERSION_NAME }}
          path: release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.VERSION_NAME) || github.ref_name }}
          name: ElimuSaaS v${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## ElimuSaaS Android App v${{ steps.version.outputs.VERSION_NAME }}

            ${{ steps.version.outputs.RELEASE_NOTES }}

            ### How to Install
            1. Tap the APK file below to download
            2. Open it and tap Install
            3. If blocked: Settings -> Security -> Install unknown apps -> Allow
            4. Sign in with your school credentials

            Backend: https://elimu-saas.onrender.com
          files: release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove keystore from runner
        if: always()
        run: rm -f android/app/keystore.jks
