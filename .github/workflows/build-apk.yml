name: Build & Release ElimuSaaS APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.1)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'What changed'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Gradle
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      # 5. Version handling
      - name: Set version variables
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
            NOTES="Release $VER"
          else
            VER="${{ github.event.inputs.version_name || '1.0.0' }}"
            NOTES="${{ github.event.inputs.release_notes || 'Auto build' }}"
          fi

          echo "VERSION_NAME=$VER" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES=$NOTES" >> $GITHUB_OUTPUT

          IFS='.' read -r MA MI PA <<< "$VER"
          echo "VERSION_CODE=$(( ${MA:-1}*10000 + ${MI:-0}*100 + ${PA:-0} ))" >> $GITHUB_OUTPUT

      # 6. Patch version
      - name: Patch version in Gradle
        working-directory: android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.VERSION_NAME }}\"/" app/build.gradle

      # 7. Setup keystore
      - name: Setup keystore
        id: keystore
        run: |
          KS_FILE="android/app/keystore.jks"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KS_FILE"
            echo "KS_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No keystore provided. Generating temporary one"
            KS_PASS="TempKey$(date +%s)"
            KS_ALIAS="elimusaas"

            keytool -genkeypair \
              -keystore "$KS_FILE" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias "$KS_ALIAS" \
              -storepass "$KS_PASS" \
              -keypass "$KS_PASS" \
              -dname "CN=ElimuSaaS, O=ElimuSaaS, C=KE" \
              -noprompt

            echo "KS_PASSWORD=$KS_PASS" >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=$KS_ALIAS" >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=$KS_PASS" >> $GITHUB_OUTPUT
          fi

      # 8. Build APK
      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.KS_PASSWORD }}
          KEY_ALIAS: ${{ steps.keystore.outputs.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # 9. Save APK
      - name: Prepare APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
          release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk

      # 10. Upload artifact (always)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElimuSaaS-APK
          path: release-artifacts/*.apk

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ElimuSaaS-APK
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ElimuSaaS ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            📱 ElimuSaaS Android App

            ### Install
            1. Download APK below
            2. Open and install
            3. Allow unknown apps if needed

            Backend: https://elimu-saas.onrender.com
          files: release-artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
