package ke.elimusaas.data

data class LoginResponse(
    val accessToken: String?,
    val refreshToken: String?,
    val user: User?,
    val error: String?
)

data class User(
    val id: Int,
    val firstName: String,
    val lastName: String,
    val email: String,
    val role: String,
    val schoolName: String?,
    val schoolCode: String?,
    val schoolId: Int?,
    val profilePhoto: String?
) {
    val fullName get() = "$firstName $lastName"
    val initials get() = "${firstName.firstOrNull() ?: ""}${lastName.firstOrNull() ?: ""}".uppercase()
    val displayRole get() = role.replace("_", " ").split(" ").joinToString(" ") {
        it.replaceFirstChar { c -> c.uppercase() }
    }
}

data class DashboardStats(
    val totalStudents: Int = 0,
    val totalTeachers: Int = 0,
    val totalStaff: Int = 0,
    val totalStreams: Int = 0,
    val feeCollectionRate: Double = 0.0,
    val attendanceRate: Double = 0.0
)

data class SchoolEvent(val id: Int, val title: String, val date: String, val description: String?)

data class SubjectResult(
    val subject: String,
    val className: String,
    val stream: String,
    val examName: String,
    val term: String,
    val year: String = "",
    val meanPoints: Double,
    val meanMarks: Double,
    val meanGrade: String,
    val totalStudents: Int,
    val trend: Double = 0.0
)

data class StudentResult(
    val id: Int,
    val name: String,
    val admNo: String,
    val stream: String,
    val meanMarks: Double,
    val totalPoints: Int,
    val outOf: Int,
    val meanGrade: String,
    val position: Int,
    val totalStudents: Int,
    val streamPosition: Int,
    val streamTotal: Int,
    val kcpe: Int?,
    val trend: Double = 0.0
)

data class ApiError(val message: String)
ENDKOTLIN
          echo "✅ Models patched"

      - name: Set version variables
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version_name }}"
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            VER="${GITHUB_REF#refs/tags/v}"
            NOTES="Release $VER"
          fi
          echo "VERSION_NAME=$VER" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES=$NOTES" >> $GITHUB_OUTPUT
          IFS='.' read -r MA MI PA <<< "$VER"
          echo "VERSION_CODE=$(( ${MA:-1}*10000 + ${MI:-0}*100 + ${PA:-0} ))" >> $GITHUB_OUTPUT

      - name: Patch version in build.gradle
        working-directory: android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.VERSION_NAME }}\"/" app/build.gradle

      - name: Setup keystore
        id: keystore
        run: |
          KS_FILE="android/app/keystore.jks"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using saved keystore from secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KS_FILE"
            echo "KS_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"           >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_OUTPUT
          else
            echo "Auto-generating keystore"
            KS_PASS="ElimuSaaS$(date +%Y)Secure"
            KS_ALIAS="elimusaas"
            keytool -genkeypair -v \
              -keystore "$KS_FILE" -keyalg RSA -keysize 2048 -validity 10000 \
              -alias "$KS_ALIAS" -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=ElimuSaaS, O=ElimuSaaS Ltd, C=KE" -noprompt
            echo "=== SAVE THESE AS GITHUB SECRETS ==="
            echo "KEYSTORE_BASE64:"
            base64 -w 0 "$KS_FILE"
            echo ""
            echo "KEYSTORE_PASSWORD: $KS_PASS"
            echo "KEY_ALIAS: $KS_ALIAS"
            echo "KEY_PASSWORD: $KS_PASS"
            echo "KS_PASSWORD=$KS_PASS"  >> $GITHUB_OUTPUT
            echo "KEY_ALIAS=$KS_ALIAS"   >> $GITHUB_OUTPUT
            echo "KEY_PASSWORD=$KS_PASS" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.KS_PASSWORD }}
          KEY_ALIAS: ${{ steps.keystore.outputs.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             "release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElimuSaaS-APK-v${{ steps.version.outputs.VERSION_NAME }}
          path: release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.VERSION_NAME) || github.ref_name }}
          name: ElimuSaaS v${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## ElimuSaaS Android App v${{ steps.version.outputs.VERSION_NAME }}

            ${{ steps.version.outputs.RELEASE_NOTES }}

            ### How to Install
            1. Tap ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk below
            2. Open the downloaded file and tap Install
            3. If blocked: Settings → Security → Install unknown apps → Allow
            4. Sign in with your school credentials

            Backend: https://elimu-saas.onrender.com
          files: release-artifacts/ElimuSaaS-v${{ steps.version.outputs.VERSION_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove keystore from runner
        if: always()
        run: rm -f android/app/keystore.jks
