# ============================================================
# Render.com Deployment Configuration
# ============================================================

services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: elimu-saas-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elimu-saas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: elimu-saas-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    autoDeploy: true
    healthCheckPath: /health

  # ── Frontend Static Site ─────────────────────────────────
  - type: web
    name: elimu-saas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /api/*
        name: Cache-Control
        value: no-store
    routes:
      - type: rewrite
        source: /api/*
        destination: https://elimu-saas-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://elimu-saas-api.onrender.com

databases:
  - name: elimu-saas-db
    databaseName: elimu_saas
    plan: starter
    region: frankfurt

  - name: elimu-saas-redis
    type: redis
    plan: starter
    region: frankfurt
